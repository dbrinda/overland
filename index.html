<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #0F0F0C; }
:root {
  --bg: #0F0F0C; --surface: #1A1A14; --surface2: #222219; --border: #2E2E24;
  --gold: #C8A84A; --gold-dim: #8A7232; --green: #4E7A52;
  --rust: #A0522D; --snow: #7EB8C4; --amber: #C89A30;
  --text: #E0DCC8; --text-dim: #888070;
  --checked-text: #4A4A38; --checked-line: #383828;
}
body { background:var(--bg); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:13px; min-height:100vh; padding-bottom:64px; }

.header { position:sticky; top:0; z-index:100; background:var(--bg); border-bottom:2px solid var(--border); padding:12px 16px 10px; }
.header-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.title { font-family:'Oswald',sans-serif; font-size:22px; font-weight:700; letter-spacing:0.06em; color:var(--gold); text-transform:uppercase; line-height:1; }
.subtitle { font-size:9px; color:var(--text-dim); letter-spacing:0.15em; text-transform:uppercase; margin-top:3px; }
.overall-count { font-family:'Oswald',sans-serif; font-size:26px; font-weight:600; color:var(--gold); text-align:right; line-height:1; }
.overall-label { font-size:9px; color:var(--text-dim); letter-spacing:0.1em; text-transform:uppercase; text-align:right; margin-top:2px; }
.progress-track { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--green) 0%,var(--gold) 100%); border-radius:2px; transition:width 0.4s ease; }

.controls { background:var(--surface); border-bottom:1px solid var(--border); padding:8px 12px; display:flex; flex-direction:column; gap:8px; }
.search-wrap { position:relative; }
.search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:12px; pointer-events:none; }
.search-input { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:12px; padding:8px 10px 8px 30px; border-radius:4px; outline:none; -webkit-appearance:none; }
.search-input:focus { border-color:var(--gold-dim); }
.search-input::placeholder { color:var(--text-dim); }
.filter-row { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; }
.filter-row::-webkit-scrollbar { display:none; }
.fbtn { background:none; border:1px solid var(--border); color:var(--text-dim); font-family:'IBM Plex Mono',monospace; font-size:9px; padding:5px 10px; border-radius:20px; cursor:pointer; white-space:nowrap; transition:all 0.15s; letter-spacing:0.06em; text-transform:uppercase; -webkit-tap-highlight-color:transparent; }
.fbtn.active { background:var(--gold); border-color:var(--gold); color:var(--bg); font-weight:500; }

.section { border-bottom:1px solid var(--border); }
.section.hidden { display:none; }
.sec-header { display:flex; align-items:center; gap:10px; padding:13px 16px; background:var(--surface); cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; transition:background 0.1s; }
.sec-header:active { background:var(--surface2); }
.sec-icon { font-size:15px; width:20px; text-align:center; flex-shrink:0; }
.sec-title { font-family:'Oswald',sans-serif; font-size:14px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; flex:1; }
.sec-stat { font-size:10px; color:var(--text-dim); white-space:nowrap; transition:color 0.2s; }
.sec-stat.done { color:var(--green); }
.sec-chevron { font-size:9px; color:var(--text-dim); transition:transform 0.2s; flex-shrink:0; }
.section.collapsed .sec-chevron { transform:rotate(-90deg); }
.sec-bar { height:2px; background:var(--border); }
.sec-bar-fill { height:100%; background:var(--green); transition:width 0.3s ease; }
.sec-items { background:var(--bg); }
.section.collapsed .sec-items { display:none; }

.sub-label { font-family:'Oswald',sans-serif; font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-dim); padding:10px 16px 3px; font-weight:400; }

/* ── SWIPE ITEM WRAPPER ── */
.item-wrap { position:relative; overflow:hidden; border-bottom:1px solid rgba(46,46,36,0.5); }
.item-wrap:last-child { border-bottom:none; }
.swipe-hint { position:absolute; top:0; right:0; bottom:0; width:80px; display:flex; align-items:center; justify-content:center; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; pointer-events:none; transition:opacity 0.15s; opacity:0; }
.swipe-hint.left  { right:auto; left:0; background:var(--green); color:white; }
.swipe-hint.right { background:#6B2222; color:#E8C0C0; }

.item { display:flex; align-items:flex-start; padding:10px 16px; gap:12px; cursor:pointer; transition:transform 0.05s, background 0.1s; will-change:transform; touch-action:pan-y; -webkit-tap-highlight-color:transparent; background:var(--bg); }
.item:active { background:var(--surface2); }
.item.hidden { display:none; }
.item.dismissed { display:none; }
.item.checked { background:rgba(0,0,0,0.15); }
.cb { width:19px; height:19px; border:1.5px solid var(--border); border-radius:3px; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.2s; background:var(--surface); }
.item.checked .cb { background:var(--green); border-color:var(--green); }
.ck { color:white; font-size:11px; opacity:0; transform:scale(0.3); transition:all 0.15s; }
.item.checked .ck { opacity:1; transform:scale(1); }
.item-body { flex:1; min-width:0; }
.item-text { font-size:12px; line-height:1.5; color:var(--text); transition:color 0.2s; word-break:break-word; }
.item.checked .item-text { color:var(--checked-text); text-decoration:line-through; text-decoration-color:var(--checked-line); }
.tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.tag { font-size:8px; padding:1px 5px; border-radius:2px; letter-spacing:0.08em; text-transform:uppercase; font-weight:500; }
.tag-optional { background:rgba(160,82,45,0.18); color:var(--rust); border:1px solid rgba(160,82,45,0.3); }
.tag-seasonal { background:rgba(126,184,196,0.12); color:var(--snow); border:1px solid rgba(126,184,196,0.25); }
.tag-solo { background:rgba(200,168,74,0.12); color:var(--amber); border:1px solid rgba(200,168,74,0.25); }

.action-bar { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); padding:9px 12px; display:flex; gap:7px; z-index:100; }
.abtn { flex:1; background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); font-family:'IBM Plex Mono',monospace; font-size:10px; padding:8px 4px; border-radius:4px; cursor:pointer; text-transform:uppercase; letter-spacing:0.04em; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
.abtn:active { opacity:0.7; }
.abtn.danger { color:#884040; border-color:#2A1818; }
.abtn.gold { background:var(--gold); border-color:var(--gold); color:var(--bg); font-weight:500; }
.abtn.active-state { background:rgba(200,168,74,0.15); border-color:var(--gold-dim); color:var(--gold); }

.custom-add-row { display:flex; gap:8px; padding:10px 12px; background:var(--bg); }
.custom-input { flex:1; background:var(--surface2); border:1px solid var(--border); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:12px; padding:8px 10px; border-radius:4px; outline:none; -webkit-appearance:none; }
.custom-input:focus { border-color:var(--gold-dim); }
.custom-input::placeholder { color:var(--text-dim); }
.add-btn { background:var(--surface2); border:1px solid var(--border); color:var(--gold); font-family:'IBM Plex Mono',monospace; font-size:12px; padding:8px 14px; border-radius:4px; cursor:pointer; white-space:nowrap; -webkit-tap-highlight-color:transparent; }
.add-btn:active { opacity:0.7; }
.del-btn { background:none; border:none; color:#664040; font-size:16px; cursor:pointer; padding:0 4px; line-height:1; flex-shrink:0; -webkit-tap-highlight-color:transparent; align-self:center; }
.del-btn:active { color:#994040; }

.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:24px 20px 20px; max-width:280px; width:90%; text-align:center; }
.modal-title { font-family:'Oswald',sans-serif; font-size:16px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--text); margin-bottom:8px; }
.modal-body { font-size:11px; color:var(--text-dim); line-height:1.6; margin-bottom:20px; }
.modal-btns { display:flex; gap:8px; }
.modal-btn { flex:1; font-family:'IBM Plex Mono',monospace; font-size:11px; padding:10px; border-radius:4px; cursor:pointer; text-transform:uppercase; letter-spacing:0.05em; border:1px solid var(--border); -webkit-tap-highlight-color:transparent; }
.modal-btn.cancel { background:var(--surface2); color:var(--text-dim); }
.modal-btn.confirm { background:#6B2222; border-color:#6B2222; color:#E8C0C0; font-weight:500; }
.modal-btn:active { opacity:0.75; }

/* dismissed items shown in "show hidden" mode */
.item-wrap.show-dismissed .item.dismissed { display:flex; opacity:0.4; }

@media print {
  .action-bar,.controls { display:none; }
  .header { position:static; }
  .section.collapsed .sec-items { display:block; }
  .item { padding:5px 16px; }
  body { padding-bottom:0; font-size:11px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="title">⛰ Overland Ready</div>
      <div class="subtitle">GX550 Overtrail+ · Adventure Checklist</div>
    </div>
    <div>
      <div class="overall-count" id="ov-count">0/0</div>
      <div class="overall-label">packed</div>
    </div>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="ov-bar" style="width:0%"></div>
  </div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="search" type="text" placeholder="search items..." oninput="doSearch(this.value)">
  </div>
  <div class="filter-row">
    <button class="fbtn active" onclick="setFilter('all',this)">All</button>
    <button class="fbtn" onclick="setFilter('unchecked',this)">Remaining</button>
    <button class="fbtn" onclick="setFilter('checked',this)">Packed ✓</button>
    <button class="fbtn" onclick="setFilter('optional',this)">Optional</button>
    <button class="fbtn" onclick="setFilter('seasonal',this)">Seasonal ❄</button>
    <button class="fbtn" onclick="setFilter('solo',this)">Solo Trip</button>
  </div>
</div>

<div id="app-gear"></div>

<div id="custom-section" class="section">
  <div class="sec-header" onclick="togSec('custom')">
    <span class="sec-icon">✏️</span>
    <span class="sec-title">Custom Items</span>
    <span class="sec-stat" id="ss-custom">0/0</span>
    <span class="sec-chevron">▼</span>
  </div>
  <div class="sec-bar"><div class="sec-bar-fill" id="sb-custom" style="width:0%"></div></div>
  <div class="sec-items" id="custom-items"></div>
  <div class="custom-add-row">
    <input class="custom-input" id="custom-input" type="text" placeholder="Add a custom item..."
      onkeydown="if(event.key==='Enter')addCustomItem()">
    <button class="add-btn" onclick="addCustomItem()">+ Add</button>
  </div>
</div>

<div id="app-proc"></div>

<div class="modal-overlay" id="reset-modal">
  <div class="modal">
    <div class="modal-title">Reset Checklist?</div>
    <div class="modal-body">This will uncheck all items and restore any hidden items.<br>Your custom items will be kept.</div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn confirm" onclick="confirmReset()">Reset All</button>
    </div>
  </div>
</div>

<div class="action-bar">
  <button class="abtn danger" onclick="doReset()">↺ Reset</button>
  <button class="abtn" onclick="collapseAll()">− All</button>
  <button class="abtn" onclick="expandAll()">+ All</button>
  <button class="abtn" id="hidden-btn" onclick="toggleShowHidden()">👁 Hidden</button>
  <button class="abtn gold" onclick="window.print()">Print</button>
</div>

const KEY='overland-v4';
let chk={}, col={}, dismissed={}, filter='all', srch='', showHidden=false;
let customItems=[];

function load(){
  try{
    const s=JSON.parse(localStorage.getItem(KEY)||'{}');
    chk=s.chk||{}; col=s.col||{}; dismissed=s.dismissed||{}; customItems=s.custom||[];
  }catch(e){}
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify({chk,col,dismissed,custom:customItems}));}catch(e){}
}

function allItems(sec){return sec.subs?sec.subs.flatMap(s=>s.items):sec.items||[];}
function totals(){
  let t=0,d=0;
  DATA.forEach(s=>{allItems(s).forEach(i=>{if(!dismissed[i.id]){t++;if(chk[i.id])d++;}});});
  customItems.forEach(i=>{t++;if(chk[i.id])d++;});
  return{t,d};
}
function secTotals(sec){
  const its=allItems(sec).filter(i=>!dismissed[i.id]);
  return{t:its.length,d:its.filter(i=>chk[i.id]).length};
}

const PROC_IDS=['pre','lightsout','camp-dep'];
function render(){
  const gear=DATA.filter(s=>!PROC_IDS.includes(s.id));
  const proc=DATA.filter(s=>PROC_IDS.includes(s.id));
  document.getElementById('app-gear').innerHTML=gear.map(s=>renderSec(s)).join('');
  document.getElementById('app-proc').innerHTML=proc.map(s=>renderSec(s)).join('');
  updOverall(); applyFilter(); attachSwipe();
}

function renderSec(sec){
  const{t,d}=secTotals(sec); const pct=t>0?(d/t*100):0; const done=d===t&&t>0;
  const body=sec.subs
    ?sec.subs.map(sub=>`<div class="sub-label">${sub.label}</div>${sub.items.map(renderItem).join('')}`).join('')
    :(sec.items||[]).map(renderItem).join('');
  return`<div class="section${col[sec.id]?' collapsed':''}" id="sec-${sec.id}">
    <div class="sec-header" onclick="togSec('${sec.id}')">
      <span class="sec-icon">${sec.icon}</span>
      <span class="sec-title">${sec.title}</span>
      <span class="sec-stat${done?' done':''}" id="ss-${sec.id}">${d}/${t}</span>
      <span class="sec-chevron">▼</span>
    </div>
    <div class="sec-bar"><div class="sec-bar-fill" id="sb-${sec.id}" style="width:${pct}%"></div></div>
    <div class="sec-items">${body}</div>
  </div>`;
}

function renderItem(item){
  const tags=(item.x||[]);
  const isChk=!!chk[item.id];
  const isDismissed=!!dismissed[item.id];
  const tagHTML=tags.map(t=>`<span class="tag tag-${t}">${t}</span>`).join('');
  return`<div class="item-wrap${isDismissed?' dismissed-wrap':''}">
    <div class="swipe-hint left">restore</div>
    <div class="swipe-hint right">hide</div>
    <div class="item${isChk?' checked':''}${isDismissed?' dismissed':''}" id="it-${item.id}" data-id="${item.id}" data-tags="${tags.join(',')}" data-text="${item.t.toLowerCase()}">
      <div class="cb" onclick="togItem('${item.id}');event.stopPropagation()"><span class="ck">✓</span></div>
      <div class="item-body" onclick="togItem('${item.id}')">
        <div class="item-text">${item.t}</div>
        ${tagHTML?`<div class="tags">${tagHTML}</div>`:''}
      </div>
    </div>
  </div>`;
}

// ── SWIPE TO HIDE ────────────────────────────────────────────
function attachSwipe(){
  document.querySelectorAll('#app-gear .item, #app-proc .item').forEach(el=>{
    let startX=0, startY=0, dx=0, dragging=false, moved=false;
    const wrap=el.closest('.item-wrap');
    const hintL=wrap.querySelector('.swipe-hint.left');
    const hintR=wrap.querySelector('.swipe-hint.right');

    function onStart(x,y){ startX=x; startY=y; dx=0; dragging=true; moved=false; }
    function onMove(x,y){
      if(!dragging)return;
      const diffX=x-startX, diffY=y-startY;
      if(!moved && Math.abs(diffY)>Math.abs(diffX)){dragging=false;return;}
      moved=true; dx=diffX;
      el.style.transform=`translateX(${dx}px)`;
      const pct=Math.min(Math.abs(dx)/80,1);
      if(dx>0){ hintL.style.opacity=pct; hintR.style.opacity=0; }
      else     { hintR.style.opacity=pct; hintL.style.opacity=0; }
    }
    function onEnd(){
      if(!dragging){return;}
      dragging=false;
      const id=el.dataset.id;
      const isDismissed=!!dismissed[id];
      if(Math.abs(dx)>60){
        if(dx<0 && !isDismissed){
          // swipe left → dismiss/hide
          el.style.transition='transform 0.25s ease, opacity 0.25s ease';
          el.style.transform='translateX(-110%)'; el.style.opacity='0';
          setTimeout(()=>{
            dismissed[id]=true; save();
            el.style.transition=''; el.style.transform=''; el.style.opacity='';
            el.classList.add('dismissed');
            wrap.classList.add('dismissed-wrap');
            updSec(); updOverall(); applyFilter();
          },240);
        } else if(dx>0 && isDismissed){
          // swipe right → restore
          dismissed[id]=false; delete dismissed[id]; save();
          el.classList.remove('dismissed');
          wrap.classList.remove('dismissed-wrap');
          updSec(); updOverall(); applyFilter();
          el.style.transition='transform 0.2s ease';
          el.style.transform=''; setTimeout(()=>el.style.transition='',200);
        } else {
          snap(el);
        }
      } else { snap(el); }
      hintL.style.opacity=0; hintR.style.opacity=0;
    }
    function snap(el){
      el.style.transition='transform 0.2s ease';
      el.style.transform='';
      setTimeout(()=>el.style.transition='',200);
    }

    el.addEventListener('touchstart',e=>{
      const t=e.touches[0]; onStart(t.clientX,t.clientY);
    },{passive:true});
    el.addEventListener('touchmove',e=>{
      const t=e.touches[0]; onMove(t.clientX,t.clientY);
      if(moved)e.preventDefault();
    },{passive:false});
    el.addEventListener('touchend',onEnd,{passive:true});
    // mouse support for desktop testing
    el.addEventListener('mousedown',e=>{onStart(e.clientX,e.clientY);});
    window.addEventListener('mousemove',e=>{if(dragging)onMove(e.clientX,e.clientY);});
    window.addEventListener('mouseup',()=>{if(dragging)onEnd();});
  });
}

function toggleShowHidden(){
  showHidden=!showHidden;
  const btn=document.getElementById('hidden-btn');
  btn.classList.toggle('active-state',showHidden);
  document.querySelectorAll('#app-gear .item-wrap, #app-proc .item-wrap, #custom-section .item-wrap').forEach(w=>{
    w.classList.toggle('show-dismissed',showHidden);
  });
}

function togItem(id){
  chk[id]=!chk[id]; save();
  const el=document.getElementById('it-'+id);
  if(el)el.classList.toggle('checked',chk[id]);
  updSec(); renderCustom(); updOverall(); applyFilter();
}

function togSec(id){
  col[id]=!col[id]; save();
  if(id==='custom'){
    const sec=document.getElementById('custom-section');
    if(sec)sec.classList.toggle('collapsed',col[id]);
  } else {
    const el=document.getElementById('sec-'+id);
    if(el)el.classList.toggle('collapsed',col[id]);
  }
}

function updSec(){
  DATA.forEach(sec=>{
    const{t,d}=secTotals(sec); const pct=t>0?(d/t*100):0; const done=d===t&&t>0;
    const ss=document.getElementById('ss-'+sec.id); const sb=document.getElementById('sb-'+sec.id);
    if(ss){ss.textContent=`${d}/${t}`;ss.className='sec-stat'+(done?' done':'');}
    if(sb)sb.style.width=pct+'%';
  });
}

function updOverall(){
  const{t,d}=totals(); const pct=t>0?(d/t*100):0;
  document.getElementById('ov-count').textContent=`${d}/${t}`;
  document.getElementById('ov-bar').style.width=pct+'%';
}

function setFilter(f,btn){
  filter=f; document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); applyFilter();
}

function doSearch(val){ srch=val.trim().toLowerCase(); applyFilter(); }

function applyFilter(){
  document.querySelectorAll('#app-gear .item-wrap, #app-proc .item-wrap').forEach(wrap=>{
    const el=wrap.querySelector('.item');
    if(!el)return;
    const tags=el.dataset.tags||''; const isChk=el.classList.contains('checked');
    const isDismissed=el.classList.contains('dismissed');
    if(isDismissed&&!showHidden){wrap.style.display='none';return;}
    let show=true;
    if(filter==='unchecked')show=!isChk;
    else if(filter==='checked')show=isChk;
    else if(filter==='optional')show=tags.includes('optional');
    else if(filter==='seasonal')show=tags.includes('seasonal');
    else if(filter==='solo')show=tags.includes('solo');
    if(srch)show=show&&el.dataset.text.includes(srch);
    wrap.style.display=show?'':'none';
  });
  document.querySelectorAll('#app-gear .section, #app-proc .section').forEach(sec=>{
    const vis=Array.from(sec.querySelectorAll('.item-wrap')).filter(w=>w.style.display!=='none').length;
    sec.classList.toggle('hidden',vis===0);
  });
  applyFilterCustom();
}

// ── CUSTOM ITEMS ─────────────────────────────────────────────
function addCustomItem(){
  const inp=document.getElementById('custom-input');
  const text=(inp.value||'').trim();
  if(!text)return;
  const id='cx-'+Date.now();
  customItems.push({id,t:text});
  save(); inp.value=''; renderCustom(); updOverall();
}

function deleteCustomItem(id){
  customItems=customItems.filter(i=>i.id!==id);
  delete chk[id]; save(); renderCustom(); updOverall();
}

function renderCustom(){
  const container=document.getElementById('custom-items');
  if(!container)return;
  const t=customItems.length; const d=customItems.filter(i=>chk[i.id]).length;
  const pct=t>0?(d/t*100):0; const done=t>0&&d===t;
  const ss=document.getElementById('ss-custom'); const sb=document.getElementById('sb-custom');
  if(ss){ss.textContent=`${d}/${t}`;ss.className='sec-stat'+(done?' done':'');}
  if(sb)sb.style.width=pct+'%';
  container.innerHTML=customItems.map(item=>{
    const isChk=!!chk[item.id];
    return`<div class="item-wrap">
      <div class="item${isChk?' checked':''}" id="it-${item.id}" data-tags="" data-text="${item.t.toLowerCase()}">
        <div class="cb" onclick="togItem('${item.id}');event.stopPropagation()"><span class="ck">✓</span></div>
        <div class="item-body" onclick="togItem('${item.id}')">
          <div class="item-text">${item.t}</div>
        </div>
        <button class="del-btn" onclick="deleteCustomItem('${item.id}')">×</button>
      </div>
    </div>`;
  }).join('');
  applyFilterCustom();
}

function applyFilterCustom(){
  const container=document.getElementById('custom-items');
  if(!container)return;
  container.querySelectorAll('.item').forEach(el=>{
    const isChk=el.classList.contains('checked');
    let show=true;
    if(filter==='unchecked')show=!isChk;
    else if(filter==='checked')show=isChk;
    else if(filter==='optional'||filter==='seasonal'||filter==='solo')show=false;
    if(srch)show=show&&el.dataset.text.includes(srch);
    el.closest('.item-wrap').style.display=show?'':'none';
  });
  const sec=document.getElementById('custom-section');
  if(sec){
    const showSection=(filter==='all'||filter==='unchecked'||filter==='checked')&&(!srch||(customItems.some(i=>i.t.toLowerCase().includes(srch))));
    sec.classList.toggle('hidden',!showSection);
  }
}

function collapseAll(){ DATA.forEach(s=>{col[s.id]=true;}); col['custom']=true; save(); document.querySelectorAll('.section').forEach(s=>s.classList.add('collapsed')); }
function expandAll(){ DATA.forEach(s=>{col[s.id]=false;}); col['custom']=false; save(); document.querySelectorAll('.section').forEach(s=>s.classList.remove('collapsed')); }
function doReset(){ document.getElementById('reset-modal').classList.add('open'); }
function closeModal(){ document.getElementById('reset-modal').classList.remove('open'); }
function confirmReset(){ chk={}; dismissed={}; save(); closeModal(); render(); renderCustom(); }

load(); render(); renderCustom();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(err=>console.log('SW registration failed:',err));
  });
}
